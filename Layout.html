<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フロアレイアウトツール</title>
    
    <!-- ▼ デザイン用ファイルの読み込み ▼ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PDF出力用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; border-left: 1px solid #e5e7eb; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .ribbon-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.2s; min-width: 60px; border: 1px solid transparent; }
        .ribbon-btn:hover:not(:disabled) { background-color: #f1f5f9; border-color: #cbd5e1; }
        .ribbon-btn.active { background-color: #dbeafe; border-color: #93c5fd; }
        .ribbon-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(100%); }
        .ribbon-icon { font-size: 1.5rem; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; height: 24px;}
        .ribbon-label { font-size: 0.65rem; color: #475569; white-space: nowrap; font-weight: 500; }
        .edge-btn.active { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .door-btn.active { background-color: #f97316; color: white; border-color: #ea580c; }
        .layer-drag-over { border-top: 2px solid #3b82f6 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const ITEM_TYPES = { ROOM: 'room', WALL: 'wall', RECT: 'rect', TEXT: 'text', DOOR: 'door', LINE: 'line' };
        const BASIC_COLORS = [
          '#ffffff', '#f8fafc', '#e2e8f0', '#94a3b8', '#475569', '#000000',
          '#f87171', '#fb923c', '#fbbf24', '#4ade80', '#38bdf8', '#818cf8', 'transparent'
        ];
        
        const DEFAULT_GROUPS = [
          { id: 'group_object', name: 'アイテムレイヤー' },
          { id: 'group_wall', name: '壁・柱レイヤー' },
          { id: 'group_room', name: '部屋レイヤー' }
        ];

        // --- アイコン用SVGコンポーネント ---
        const AlignIcon = ({ type }) => {
          switch (type) {
            case 'left': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="1.5" height="12"/><rect x="4.5" y="4" width="9" height="3"/><rect x="4.5" y="9" width="6" height="3"/></svg>;
            case 'center': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="7.5" y="2" width="1.5" height="12"/><rect x="3.5" y="4" width="9" height="3"/><rect x="5" y="9" width="6" height="3"/></svg>;
            case 'right': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="12.5" y="2" width="1.5" height="12"/><rect x="2.5" y="4" width="9" height="3"/><rect x="5.5" y="9" width="6" height="3"/></svg>;
            case 'top': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="1.5"/><rect x="4" y="4.5" width="3" height="9"/><rect x="9" y="4.5" width="3" height="6"/></svg>;
            case 'middle': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="7.5" width="12" height="1.5"/><rect x="4" y="3.5" width="3" height="9"/><rect x="9" y="5" width="3" height="6"/></svg>;
            case 'bottom': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="12.5" width="12" height="1.5"/><rect x="4" y="2.5" width="3" height="9"/><rect x="9" y="5.5" width="3" height="6"/></svg>;
            case 'dist-h': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="1.5" height="12"/><rect x="13.5" y="2" width="1.5" height="12"/><rect x="4.5" y="4" width="2" height="8"/><rect x="9.5" y="4" width="2" height="8"/></svg>;
            case 'dist-v': return <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="1" width="12" height="1.5"/><rect x="2" y="13.5" width="12" height="1.5"/><rect x="4" y="4.5" width="8" height="2"/><rect x="4" y="9.5" width="8" height="2"/></svg>;
            default: return null;
          }
        };

        const EyeIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const EyeOffIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
        const LockIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const UnlockIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const FolderIcon = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" className="mr-1 text-blue-500"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 14H4V8h16v12z"/></svg>;
        const LineIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="20" x2="20" y2="4"></line></svg>;

        const LayoutEditor = () => {
          const [floors, setFloors] = useState([]);
          const [allItems, setAllItems] = useState([]);
          const [itemGroups, setItemGroups] = useState(DEFAULT_GROUPS);
          const [currentFloorId, setCurrentFloorId] = useState(null);
          
          const [selectedItemIds, setSelectedItemIds] = useState([]);
          const [placementMode, setPlacementMode] = useState(null); 

          const [editingFloorId, setEditingFloorId] = useState(null);
          const [editFloorName, setEditFloorName] = useState('');

          const [editingGroupId, setEditingGroupId] = useState(null);
          const [editGroupName, setEditGroupName] = useState('');
          const [expandedGroups, setExpandedGroups] = useState(['group_room', 'group_wall', 'group_object']);

          const [dragOverItemId, setDragOverItemId] = useState(null);
          const [dragOverGroupId, setDragOverGroupId] = useState(null);

          const [past, setPast] = useState([]);
          const [future, setFuture] = useState([]);

          const mainRef = useRef(null);
          const canvasRef = useRef(null);
          const fileInputRef = useRef(null); 
          const bgInputRef = useRef(null); 
          
          const zoomRef = useRef(1);
          const [zoom, _setZoom] = useState(1);
          const setZoom = useCallback((val) => { zoomRef.current = val; _setZoom(val); }, []);

          const [bgImage, setBgImage] = useState(null);
          const [bgOpacity, setBgOpacity] = useState(0.5); 
          const [bgScale, setBgScale] = useState(100); 

          const [isDragging, setIsDragging] = useState(false);
          const [isResizing, setIsResizing] = useState(false);
          const [isRotating, setIsRotating] = useState(false);
          const [dragStartInfo, setDragStartInfo] = useState(null);
          const [lineDrawingState, setLineDrawingState] = useState(null); // 線引き用状態
          
          const [selectionBox, setSelectionBox] = useState(null);
          const [tempItems, setTempItems] = useState(null);

          const [targetEdge, setTargetEdge] = useState('all'); 
          const [isExportingPDF, setIsExportingPDF] = useState(false);

          useEffect(() => {
            const initialFloor = { id: Date.now().toString(), name: 'フロア 1', order: 0 };
            setFloors([initialFloor]);
            setCurrentFloorId(initialFloor.id);
            setAllItems([]);
            setItemGroups(DEFAULT_GROUPS);
            setSelectedItemIds([]);
            setPast([]); setFuture([]); setZoom(1); setBgImage(null);
          }, []);

          const saveFloors = (newFloors) => setFloors(newFloors);
          const saveAllItems = (newItems) => setAllItems(newItems);
          const saveGroups = (newGroups) => setItemGroups(newGroups);

          const handleExportJSON = () => {
            const data = { version: "1.9", floors, items: allItems, groups: itemGroups, bgImage, bgOpacity, bgScale };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'fuji_layout_data.json';
            a.click(); URL.revokeObjectURL(url);
          };

          const handleImportJSON = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);
                if (data.floors && data.items) {
                  saveFloors(data.floors); 
                  saveAllItems(data.items);
                  if (data.groups) saveGroups(data.groups);
                  else saveGroups(DEFAULT_GROUPS);
                  
                  if (data.bgImage !== undefined) setBgImage(data.bgImage);
                  if (data.bgOpacity !== undefined) setBgOpacity(data.bgOpacity);
                  if (data.bgScale !== undefined) setBgScale(data.bgScale);

                  if (data.floors.length > 0) setCurrentFloorId(data.floors[0].id);
                  setSelectedItemIds([]); setPast([]); setFuture([]); setZoom(1); 
                  alert('データの読み込みが完了しました。');
                }
              } catch (error) { alert('ファイルの読み込みに失敗しました。'); }
            };
            reader.readAsText(file); e.target.value = ''; 
          };

          const handleBgImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) { 
              const reader = new FileReader();
              reader.onload = (event) => {
                setBgImage(event.target.result);
                setBgScale(100); 
                setBgOpacity(0.5); 
              };
              reader.readAsDataURL(file);
            }
            e.target.value = '';
          };

          const handleExportImage = async () => {
            if (!canvasRef.current) return;
            const visibleItems = allItems.filter(i => i.floorId === currentFloorId && !i.isHidden);
            if (visibleItems.length === 0) { alert('出力するアイテムがありません。'); return; }

            setIsExportingPDF(true); 
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            visibleItems.forEach(item => {
                if (item.x < minX) minX = item.x;
                if (item.y < minY) minY = item.y;
                if (item.x + item.width > maxX) maxX = item.x + item.width;
                if (item.y + item.height > maxY) maxY = item.y + item.height;
            });

            const padding = 50;
            minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
            maxX = Math.min(10000, maxX + padding); maxY = Math.min(10000, maxY + padding);

            const originalTransform = canvasRef.current.style.transform;
            const originalBgImage = canvasRef.current.style.backgroundImage;
            canvasRef.current.style.transform = 'scale(1)';
            canvasRef.current.style.backgroundImage = 'none';
            await new Promise(resolve => setTimeout(resolve, 150));

            try {
                const canvas = await html2canvas(canvasRef.current, {
                    x: minX, y: minY, width: maxX - minX, height: maxY - minY,
                    scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollX: 0, scrollY: 0
                });
                canvasRef.current.style.transform = originalTransform;
                canvasRef.current.style.backgroundImage = originalBgImage;

                const imgData = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = imgData; a.download = 'Layout.png'; a.click();
            } catch (err) {
                canvasRef.current.style.transform = originalTransform; canvasRef.current.style.backgroundImage = originalBgImage;
                console.error(err); alert("画像の生成に失敗しました。");
            } finally { setIsExportingPDF(false); }
          };

          const handleExportPDF = async () => {
            if (!canvasRef.current) return;
            const visibleItems = allItems.filter(i => i.floorId === currentFloorId && !i.isHidden);
            if (visibleItems.length === 0) { alert('出力するアイテムがありません。'); return; }

            setIsExportingPDF(true);
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            visibleItems.forEach(item => {
                if (item.x < minX) minX = item.x;
                if (item.y < minY) minY = item.y;
                if (item.x + item.width > maxX) maxX = item.x + item.width;
                if (item.y + item.height > maxY) maxY = item.y + item.height;
            });

            const padding = 50;
            minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
            maxX = Math.min(10000, maxX + padding); maxY = Math.min(10000, maxY + padding);
            const targetWidth = maxX - minX; const targetHeight = maxY - minY;

            const originalTransform = canvasRef.current.style.transform;
            const originalBgImage = canvasRef.current.style.backgroundImage;
            canvasRef.current.style.transform = 'scale(1)';
            canvasRef.current.style.backgroundImage = 'none';
            await new Promise(resolve => setTimeout(resolve, 150));

            try {
                const { jsPDF } = window.jspdf;
                const canvas = await html2canvas(canvasRef.current, {
                    x: minX, y: minY, width: targetWidth, height: targetHeight,
                    scale: 1.5, useCORS: true, backgroundColor: '#ffffff', scrollX: 0, scrollY: 0
                });
                canvasRef.current.style.transform = originalTransform;
                canvasRef.current.style.backgroundImage = originalBgImage;

                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                const pdf = new jsPDF({ orientation: targetWidth > targetHeight ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });
                const pdfWidth = pdf.internal.pageSize.getWidth(); const pdfHeight = pdf.internal.pageSize.getHeight();
                const margin = 10; const maxImgWidth = pdfWidth - margin * 2; const maxImgHeight = pdfHeight - margin * 2;

                let ratio = targetWidth / targetHeight;
                let destWidth = maxImgWidth; let destHeight = maxImgWidth / ratio;
                if (destHeight > maxImgHeight) { destHeight = maxImgHeight; destWidth = maxImgHeight * ratio; }

                const destX = (pdfWidth - destWidth) / 2; const destY = (pdfHeight - destHeight) / 2;
                pdf.addImage(imgData, 'JPEG', destX, destY, destWidth, destHeight, undefined, 'FAST');
                pdf.save('Layout.pdf');
            } catch (err) {
                canvasRef.current.style.transform = originalTransform; canvasRef.current.style.backgroundImage = originalBgImage;
                console.error(err); alert("PDFの生成に失敗しました。");
            } finally { setIsExportingPDF(false); }
          };

          useEffect(() => {
            const mainEl = mainRef.current;
            if (!mainEl) return;
            const handleWheel = (e) => {
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault(); 
                const mainRect = mainEl.getBoundingClientRect();
                if (!canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const rx = (e.clientX - rect.left) / zoomRef.current;
                const ry = (e.clientY - rect.top) / zoomRef.current;
                const newZoom = Math.min(Math.max(0.1, zoomRef.current * (e.deltaY > 0 ? 0.95 : 1.05)), 5);
                setZoom(newZoom);
                requestAnimationFrame(() => {
                  if(mainEl) {
                     mainEl.scrollLeft = rx * newZoom - (e.clientX - mainRect.left);
                     mainEl.scrollTop = ry * newZoom - (e.clientY - mainRect.top);
                  }
                });
              }
            };
            mainEl.addEventListener('wheel', handleWheel, { passive: false });
            return () => mainEl.removeEventListener('wheel', handleWheel);
          }, [setZoom]);

          const displayItems = tempItems || allItems.filter(i => i.floorId === currentFloorId);

          const saveHistory = (action, oldData, newData = null) => {
            setFuture([]); 
            setPast(prev => [...prev, { action, oldData, newData }].slice(-30));
          };

          const getMousePos = useCallback((e) => {
            if (!canvasRef.current) return { x: 0, y: 0 };
            const rect = canvasRef.current.getBoundingClientRect();
            return { x: (e.clientX - rect.left) / zoomRef.current, y: (e.clientY - rect.top) / zoomRef.current };
          }, []);

          const getInitialBorders = (type) => {
            if (type === ITEM_TYPES.LINE) return null; // 直線は枠線なし
            const width = type === ITEM_TYPES.ROOM ? 2 : type === ITEM_TYPES.TEXT ? 0 : 1;
            const c = type === ITEM_TYPES.TEXT ? 'transparent' : '#000000'; // 基本的にすべて黒に
            const base = { width, style: 'solid', color: c };
            return { top: {...base}, bottom: {...base}, left: {...base}, right: {...base} };
          };

          const addItemAtPosition = (type, x, y) => {
            if (!currentFloorId) return;
            
            let defaultGroupId = 'group_object';
            if (type === ITEM_TYPES.ROOM) defaultGroupId = 'group_room';
            if (type === ITEM_TYPES.WALL) defaultGroupId = 'group_wall';

            const baseItem = {
              id: Date.now().toString(), floorId: currentFloorId, type: type, groupId: defaultGroupId,
              x: Math.round(x), y: Math.round(y),
              width: type === ITEM_TYPES.ROOM ? 500 : type === ITEM_TYPES.WALL ? 200 : type === ITEM_TYPES.TEXT ? 150 : type === ITEM_TYPES.DOOR ? 80 : 100, 
              height: type === ITEM_TYPES.ROOM ? 500 : type === ITEM_TYPES.WALL ? 15 : type === ITEM_TYPES.TEXT ? 40 : type === ITEM_TYPES.DOOR ? 80 : 100,
              rotation: 0, opacity: 1, isHidden: false, flipX: false, flipY: false, 
              doorType: type === ITEM_TYPES.DOOR ? 'single' : undefined, 
              color: type === ITEM_TYPES.ROOM ? '#f1f5f9' : type === ITEM_TYPES.WALL ? '#64748b' : type === ITEM_TYPES.TEXT || type === ITEM_TYPES.DOOR ? 'transparent' : '#cbd5e1',
              borders: getInitialBorders(type),
              text: type === ITEM_TYPES.ROOM ? '会議室' : type === ITEM_TYPES.TEXT ? 'テキスト' : '', 
              textColor: '#000000', fontSize: 16, textAlign: 'center', verticalAlign: 'center', // 文字色も黒に
              isLocked: type === ITEM_TYPES.ROOM,
            };
            saveAllItems([baseItem, ...allItems]);
            setSelectedItemIds([baseItem.id]);
            setPlacementMode(null);
            saveHistory('add_multiple', null, [baseItem]);
          };

          const duplicateSelectedItems = () => {
            if (selectedItemIds.length === 0) return;
            const itemsToCopy = allItems.filter(i => selectedItemIds.includes(i.id));
            const newItems = itemsToCopy.map(item => ({
              ...item, id: Math.random().toString(36).substr(2, 9),
              x: item.x + 30, y: item.y + 30
            }));
            saveAllItems([...newItems, ...allItems]);
            setSelectedItemIds(newItems.map(i => i.id));
            saveHistory('add_multiple', null, newItems);
          };

          const deleteSelectedItems = () => {
            if (selectedItemIds.length === 0) return;
            const itemsToDelete = allItems.filter(i => selectedItemIds.includes(i.id));
            saveAllItems(allItems.filter(i => !selectedItemIds.includes(i.id)));
            setSelectedItemIds([]);
            saveHistory('delete_multiple', itemsToDelete, null);
          };

          const handleUndo = () => { 
            if (past.length === 0) return;
            const last = past[past.length - 1];
            setPast(prev => prev.slice(0, -1));
            setFuture(prev => [last, ...prev]);
            
            if (last.action === 'add_multiple') {
              const idsToRemove = last.newData.map(i => i.id);
              saveAllItems(allItems.filter(i => !idsToRemove.includes(i.id)));
              setSelectedItemIds([]);
            } else if (last.action === 'delete_multiple') {
              saveAllItems([...last.oldData, ...allItems]);
            } else if (last.action === 'update_multiple') {
              const oldMap = new Map(last.oldData.map(i => [i.id, i]));
              saveAllItems(allItems.map(i => oldMap.has(i.id) ? oldMap.get(i.id) : i));
            }
          };

          const handleRedo = () => {
            if (future.length === 0) return;
            const next = future[0];
            setFuture(prev => prev.slice(1));
            setPast(prev => [...prev, next]);

            if (next.action === 'add_multiple') saveAllItems([...next.newData, ...allItems]);
            else if (next.action === 'delete_multiple') {
              const idsToRemove = next.oldData.map(i => i.id);
              saveAllItems(allItems.filter(i => !idsToRemove.includes(i.id)));
              setSelectedItemIds([]);
            } else if (next.action === 'update_multiple') {
              const newMap = new Map(next.newData.map(i => [i.id, i]));
              saveAllItems(allItems.map(i => newMap.has(i.id) ? newMap.get(i.id) : i));
            }
          };

          const handleAlign = (type) => {
            if (selectedItemIds.length < 2) return;
            const items = allItems.filter(i => selectedItemIds.includes(i.id));
            const oldData = items.map(i => ({...i}));
            let newItemsData = [...allItems];
            
            const minX = Math.min(...items.map(i => i.x));
            const maxX = Math.max(...items.map(i => i.x + i.width));
            const minY = Math.min(...items.map(i => i.y));
            const maxY = Math.max(...items.map(i => i.y + i.height));

            if (type === 'distribute-h') {
                const sorted = [...items].sort((a,b) => a.x - b.x);
                const totalW = sorted.reduce((s, i) => s + i.width, 0);
                const gap = ((maxX - minX) - totalW) / (sorted.length - 1);
                let cx = minX;
                sorted.forEach(item => {
                    newItemsData = newItemsData.map(i => i.id === item.id ? { ...i, x: Math.round(cx) } : i);
                    cx += item.width + gap;
                });
            } else if (type === 'distribute-v') {
                const sorted = [...items].sort((a,b) => a.y - b.y);
                const totalH = sorted.reduce((s, i) => s + i.height, 0);
                const gap = ((maxY - minY) - totalH) / (sorted.length - 1);
                let cy = minY;
                sorted.forEach(item => {
                    newItemsData = newItemsData.map(i => i.id === item.id ? { ...i, y: Math.round(cy) } : i);
                    cy += item.height + gap;
                });
            } else {
                items.forEach(item => {
                    let u = {};
                    if (type === 'left') u.x = minX;
                    if (type === 'right') u.x = maxX - item.width;
                    if (type === 'center') u.x = Math.round(minX + (maxX - minX)/2 - item.width/2);
                    if (type === 'top') u.y = minY;
                    if (type === 'bottom') u.y = maxY - item.height;
                    if (type === 'middle') u.y = Math.round(minY + (maxY - minY)/2 - item.height/2);
                    newItemsData = newItemsData.map(i => i.id === item.id ? { ...i, ...u } : i);
                });
            }
            const newData = newItemsData.filter(i => selectedItemIds.includes(i.id));
            saveHistory('update_multiple', oldData, newData);
            saveAllItems(newItemsData);
          };

          // --- 追加: 同グループ内での重なり順変更 ---
          const changeOrder = (direction) => {
            if (selectedItemIds.length !== 1) return;
            const targetId = selectedItemIds[0];
            const currentIdx = allItems.findIndex(i => i.id === targetId);
            if (currentIdx === -1) return;
            
            const item = allItems[currentIdx];
            const groupId = item.groupId || (item.type==='room'?'group_room':item.type==='wall'?'group_wall':'group_object');
            
            let newItems = [...allItems];
            const groupIndices = [];
            newItems.forEach((it, idx) => {
                const gId = it.groupId || (it.type==='room'?'group_room':it.type==='wall'?'group_wall':'group_object');
                if (gId === groupId) groupIndices.push(idx);
            });
            
            const pos = groupIndices.indexOf(currentIdx);
            if (pos === -1) return;
            
            if (direction === 'front' && pos > 0) {
                newItems.splice(currentIdx, 1);
                newItems.splice(groupIndices[0], 0, item);
            } else if (direction === 'back' && pos < groupIndices.length - 1) {
                newItems.splice(currentIdx, 1);
                newItems.splice(groupIndices[groupIndices.length - 1], 0, item);
            } else if (direction === 'forward' && pos > 0) {
                const targetIdx = groupIndices[pos - 1];
                newItems[currentIdx] = newItems[targetIdx];
                newItems[targetIdx] = item;
            } else if (direction === 'backward' && pos < groupIndices.length - 1) {
                const targetIdx = groupIndices[pos + 1];
                newItems[currentIdx] = newItems[targetIdx];
                newItems[targetIdx] = item;
            } else {
                return;
            }
            
            saveHistory('update_multiple', allItems, newItems);
            saveAllItems(newItems);
          };

          const handleCanvasMouseDown = (e) => {
            if (!canvasRef.current) return;
            const pos = getMousePos(e);
            
            // --- 追加: 直線の描画 ---
            if (placementMode === ITEM_TYPES.LINE) {
                if (lineDrawingState && lineDrawingState.mode === 'click') {
                    // 2回目のクリックで確定
                    const finalItem = allItems.find(i => i.id === lineDrawingState.id);
                    if (finalItem) saveHistory('add_multiple', null, [finalItem]);
                    setLineDrawingState(null);
                    setPlacementMode(null);
                    return;
                }

                const newId = Date.now().toString();
                const newItem = {
                    id: newId, floorId: currentFloorId, type: ITEM_TYPES.LINE, groupId: 'group_wall',
                    x: Math.round(pos.x), y: Math.round(pos.y),
                    width: 0, height: 1, // 初期長0, 太さ1 (より細く)
                    rotation: 0, opacity: 1, isHidden: false, flipX: false, flipY: false,
                    color: '#000000', borders: null, // 直線の色を黒に
                    text: '', textColor: '#000000', fontSize: 16, textAlign: 'center', verticalAlign: 'center',
                    isLocked: false,
                };
                saveAllItems([newItem, ...allItems]);
                setSelectedItemIds([newId]);
                setLineDrawingState({ id: newId, startX: pos.x, startY: pos.y, mode: 'drag' });
                return;
            }

            if (placementMode) {
              addItemAtPosition(placementMode, pos.x, pos.y);
            } else {
              if (!(e.ctrlKey || e.metaKey)) setSelectedItemIds([]);
              setSelectionBox({ startX: pos.x, startY: pos.y, endX: pos.x, endY: pos.y });
            }
          };

          const handleItemMouseDown = (e, item, action) => {
            if (placementMode) return;
            e.stopPropagation(); 
            if (!canvasRef.current) return;
            if (item.isLocked && action !== 'rotate') return; 
            
            let newSelection = [...selectedItemIds];
            if (e.ctrlKey || e.metaKey) {
                if (newSelection.includes(item.id)) newSelection = newSelection.filter(id => id !== item.id);
                else newSelection.push(item.id);
            } else {
                if (!newSelection.includes(item.id)) newSelection = [item.id];
            }
            setSelectedItemIds(newSelection);

            const pos = getMousePos(e);
            setTempItems(allItems.filter(i => i.floorId === currentFloorId));
            const initialStates = allItems.filter(i => newSelection.includes(i.id)).map(i => ({...i}));

            if (action === 'move') { setIsDragging(true); setDragStartInfo({ startX: pos.x, startY: pos.y, targetId: item.id, initialStates }); }
            else if (action === 'resize') { setIsResizing(true); setDragStartInfo({ targetId: item.id, startX: pos.x, startY: pos.y, initialStates }); }
            else if (action === 'rotate') { setIsRotating(true); setDragStartInfo({ targetId: item.id, initialStates }); }
          };

          const handleMouseMove = (e) => {
            const pos = getMousePos(e);
            if (selectionBox) {
               setSelectionBox({ ...selectionBox, endX: pos.x, endY: pos.y }); return;
            }
            
            // スナップ用の他オブジェクトの座標を収集
            const SNAP_DIST = 10 / zoomRef.current; 
            const excludeIds = dragStartInfo ? dragStartInfo.initialStates.map(init => init.id) : (lineDrawingState ? [lineDrawingState.id] : []);
            const otherItems = allItems.filter(i => i.floorId === currentFloorId && !i.isHidden && !excludeIds.includes(i.id));
            const snapLinesX = new Set();
            const snapLinesY = new Set();
            otherItems.forEach(item => {
                snapLinesX.add(item.x); snapLinesX.add(item.x + item.width);
                snapLinesY.add(item.y); snapLinesY.add(item.y + item.height);
            });

            // --- 追加: 直線描画中 ---
            if (lineDrawingState) {
                let currentX = pos.x;
                let currentY = pos.y;
                
                // 終点スナップ (Altキーで無効化)
                if (!e.altKey) {
                    let minDiffX = SNAP_DIST;
                    snapLinesX.forEach(ox => { if (Math.abs(currentX - ox) < minDiffX) { minDiffX = Math.abs(currentX - ox); currentX = ox; } });
                    let minDiffY = SNAP_DIST;
                    snapLinesY.forEach(oy => { if (Math.abs(currentY - oy) < minDiffY) { minDiffY = Math.abs(currentY - oy); currentY = oy; } });
                }

                const dx = currentX - lineDrawingState.startX;
                const dy = currentY - lineDrawingState.startY;
                const length = Math.max(1, Math.sqrt(dx * dx + dy * dy));
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                
                // Shiftキーで45度刻みにスナップ
                if (e.shiftKey) angle = Math.round(angle / 45) * 45;

                setAllItems(prev => prev.map(item => {
                    if (item.id === lineDrawingState.id) return { ...item, width: Math.round(length), rotation: Math.round(angle) };
                    return item;
                }));
                return;
            }

            if (!isDragging && !isResizing && !isRotating) return;

            if (isDragging) {
              const dx = pos.x - dragStartInfo.startX; const dy = pos.y - dragStartInfo.startY;
              let actualDx = dx; let actualDy = dy;

              const targetInit = dragStartInfo.initialStates.find(i => i.id === dragStartInfo.targetId);
              if (targetInit && !e.altKey) { 
                  let nx = targetInit.x + dx; let ny = targetInit.y + dy;
                  let minDiffX = SNAP_DIST;
                  snapLinesX.forEach(ox => {
                      if (Math.abs(nx - ox) < minDiffX) { minDiffX = Math.abs(nx - ox); actualDx = ox - targetInit.x; }
                      if (Math.abs(nx + targetInit.width - ox) < minDiffX) { minDiffX = Math.abs(nx + targetInit.width - ox); actualDx = ox - targetInit.width - targetInit.x; }
                  });
                  let minDiffY = SNAP_DIST;
                  snapLinesY.forEach(oy => {
                      if (Math.abs(ny - oy) < minDiffY) { minDiffY = Math.abs(ny - oy); actualDy = oy - targetInit.y; }
                      if (Math.abs(ny + targetInit.height - oy) < minDiffY) { minDiffY = Math.abs(ny + targetInit.height - oy); actualDy = oy - targetInit.height - targetInit.y; }
                  });
              }
              setTempItems(prev => prev.map(item => {
                  const init = dragStartInfo.initialStates.find(i => i.id === item.id);
                  if (init) return { ...item, x: Math.round(init.x + actualDx), y: Math.round(init.y + actualDy) };
                  return item;
              }));
            } else if (isResizing) {
              const init = dragStartInfo.initialStates.find(i => i.id === dragStartInfo.targetId);
              if(init) {
                  let nWidth = Math.max(10, init.width + (pos.x - dragStartInfo.startX));
                  let nHeight = init.type === ITEM_TYPES.LINE ? init.height : Math.max(10, init.height + (pos.y - dragStartInfo.startY));
                  if (!e.altKey) {
                      let minDiffX = SNAP_DIST;
                      snapLinesX.forEach(ox => { if (Math.abs((init.x + nWidth) - ox) < minDiffX) { minDiffX = Math.abs((init.x + nWidth) - ox); nWidth = ox - init.x; } });
                      if (init.type !== ITEM_TYPES.LINE) {
                          let minDiffY = SNAP_DIST;
                          snapLinesY.forEach(oy => { if (Math.abs((init.y + nHeight) - oy) < minDiffY) { minDiffY = Math.abs((init.y + nHeight) - oy); nHeight = oy - init.y; } });
                      }
                  }
                  setTempItems(prev => prev.map(item => item.id === dragStartInfo.targetId ? { ...item, width: Math.round(nWidth), height: Math.round(nHeight) } : item));
              }
            } else if (isRotating) {
              const init = dragStartInfo.initialStates.find(i => i.id === dragStartInfo.targetId);
              if(init) {
                  const originX = init.type === ITEM_TYPES.LINE ? init.x : init.x + init.width/2;
                  const originY = init.type === ITEM_TYPES.LINE ? init.y + init.height/2 : init.y + init.height/2;
                  let angle = Math.atan2(pos.y - originY, pos.x - originX) * (180 / Math.PI);
                  if (init.type !== ITEM_TYPES.LINE) angle += 90;
                  
                  let rot = Math.round(angle); if(rot < 0) rot += 360;
                  if (!e.altKey) rot = Math.round(rot / 15) * 15;
                  setTempItems(prev => prev.map(i => i.id === dragStartInfo.targetId ? { ...i, rotation: rot } : i));
              }
            }
          };

          const handleMouseUp = (e) => {
            const pos = getMousePos(e);

            // --- 追加: 直線描画の終了判定 ---
            if (lineDrawingState) {
                const dx = pos.x - lineDrawingState.startX;
                const dy = pos.y - lineDrawingState.startY;
                if (Math.abs(dx) < 5 && Math.abs(dy) < 5 && lineDrawingState.mode === 'drag') {
                    // 移動が少ない場合は「クリックモード(2点指定)」として継続
                    setLineDrawingState({ ...lineDrawingState, mode: 'click' });
                    return;
                } else {
                    // ドラッグして引いた場合は確定
                    const finalItem = allItems.find(i => i.id === lineDrawingState.id);
                    if (finalItem) saveHistory('add_multiple', null, [finalItem]);
                    setLineDrawingState(null);
                    setPlacementMode(null);
                    return;
                }
            }

            if (selectionBox) {
                const minX = Math.min(selectionBox.startX, selectionBox.endX); const maxX = Math.max(selectionBox.startX, selectionBox.endX);
                const minY = Math.min(selectionBox.startY, selectionBox.endY); const maxY = Math.max(selectionBox.startY, selectionBox.endY);
                const newSelection = allItems.filter(item => {
                    if (item.floorId !== currentFloorId || item.isLocked || item.isHidden) return false;
                    return item.x < maxX && (item.x + item.width) > minX && item.y < maxY && (item.y + item.height) > minY;
                }).map(i => i.id);
                
                if (e.ctrlKey || e.metaKey) setSelectedItemIds(Array.from(new Set([...selectedItemIds, ...newSelection])));
                else setSelectedItemIds(newSelection);
                setSelectionBox(null); return;
            }

            if (isDragging || isResizing || isRotating) {
              const changedItems = tempItems.filter(i => dragStartInfo.initialStates.some(init => init.id === i.id));
              if (changedItems.length > 0) {
                saveHistory('update_multiple', dragStartInfo.initialStates, changedItems);
                saveAllItems(allItems.map(i => {
                    const updated = changedItems.find(c => c.id === i.id);
                    return updated ? updated : i;
                }));
              }
            }
            setIsDragging(false); setIsResizing(false); setIsRotating(false); setDragStartInfo(null); setTempItems(null);
          };

          // ==========================================
          // レイヤー(グループ)のドラッグ＆ドロップ実装
          // ==========================================
          const handleDragStartItem = (e, itemId) => { e.dataTransfer.setData('itemId', itemId); e.stopPropagation(); };
          const handleDragStartGroup = (e, groupId) => { e.dataTransfer.setData('groupId', groupId); };

          const handleDropGroupOrItem = (e, targetGroupId) => {
            e.preventDefault(); e.stopPropagation(); setDragOverGroupId(null);
            const itemId = e.dataTransfer.getData('itemId');
            const groupId = e.dataTransfer.getData('groupId');
            if (itemId) moveItemTo(itemId, targetGroupId, null);
            else if (groupId) moveGroup(groupId, targetGroupId);
          };

          const handleDropItem = (e, targetGroupId, targetItemId) => {
            e.preventDefault(); e.stopPropagation(); setDragOverItemId(null); setDragOverGroupId(null);
            const itemId = e.dataTransfer.getData('itemId');
            if (itemId) moveItemTo(itemId, targetGroupId, targetItemId);
          };

          const moveItemTo = (itemId, targetGroupId, targetItemId) => {
            if (itemId === targetItemId) return;
            const itemIndex = allItems.findIndex(i => i.id === itemId);
            if (itemIndex === -1) return;

            const newAllItems = [...allItems];
            const [draggedItem] = newAllItems.splice(itemIndex, 1);
            draggedItem.groupId = targetGroupId;

            if (targetItemId) {
              const targetIndex = newAllItems.findIndex(i => i.id === targetItemId);
              newAllItems.splice(targetIndex, 0, draggedItem);
            } else {
              const firstIndex = newAllItems.findIndex(i => i.floorId === currentFloorId && (i.groupId || (i.type==='room'?'group_room':i.type==='wall'?'group_wall':'group_object')) === targetGroupId);
              if (firstIndex !== -1) newAllItems.splice(firstIndex, 0, draggedItem);
              else newAllItems.unshift(draggedItem);
            }
            saveHistory('update_multiple', allItems, newAllItems);
            saveAllItems(newAllItems);
          };

          const moveGroup = (draggedGroupId, targetGroupId) => {
            if (draggedGroupId === targetGroupId) return;
            const draggedIdx = itemGroups.findIndex(g => g.id === draggedGroupId);
            const targetIdx = itemGroups.findIndex(g => g.id === targetGroupId);
            if (draggedIdx === -1 || targetIdx === -1) return;

            const newGroups = [...itemGroups];
            const [draggedGroup] = newGroups.splice(draggedIdx, 1);
            newGroups.splice(targetIdx, 0, draggedGroup);
            saveGroups(newGroups);
          };

          // ==========================================
          
          const updateItem = (id, updates) => {
            const oldItem = allItems.find(i => i.id === id);
            if (!oldItem) return;
            const newItem = { ...oldItem, ...updates };
            saveHistory('update_multiple', [oldItem], [newItem]);
            saveAllItems(allItems.map(i => i.id === id ? newItem : i));
          };

          const updateSelectedItems = (updates) => {
            const itemsToUpdate = allItems.filter(i => selectedItemIds.includes(i.id));
            if (itemsToUpdate.length === 0) return;
            const oldData = itemsToUpdate.map(i => ({...i}));
            const newData = itemsToUpdate.map(i => ({...i, ...updates}));
            saveHistory('update_multiple', oldData, newData);
            saveAllItems(allItems.map(i => selectedItemIds.includes(i.id) ? { ...i, ...updates } : i));
          };

          const handleBorderChange = (prop, value) => {
             const itemsToUpdate = allItems.filter(i => selectedItemIds.includes(i.id));
             if (itemsToUpdate.length === 0) return;
             const oldData = itemsToUpdate.map(i => ({...i}));
             const newAllItems = allItems.map(item => {
                 if (selectedItemIds.includes(item.id)) {
                     let borders = item.borders ? JSON.parse(JSON.stringify(item.borders)) : getInitialBorders(item.type);
                     if (targetEdge === 'all') ['top', 'bottom', 'left', 'right'].forEach(e => borders[e][prop] = value);
                     else borders[targetEdge][prop] = value;
                     return { ...item, borders };
                 }
                 return item;
             });
             saveHistory('update_multiple', oldData, newAllItems.filter(i => selectedItemIds.includes(i.id)));
             saveAllItems(newAllItems);
          };

          const getZIndex = (item) => {
             const gId = item.groupId || (item.type === 'room' ? 'group_room' : item.type === 'wall' ? 'group_wall' : 'group_object');
             const groupIndex = itemGroups.findIndex(g => g.id === gId);
             const baseZ = (100 - (groupIndex === -1 ? 0 : groupIndex)) * 1000;
             const itemIndex = allItems.findIndex(i => i.id === item.id);
             const zIndex = baseZ + (1000 - itemIndex);
             
             // 選択中のアイテムは常に最前面に来るよう、他の全アイテムより圧倒的に大きい値を加算
             if (selectedItemIds.includes(item.id)) return zIndex + 1000000;
             return zIndex;
          };

          const getBorderStyleObj = (item) => {
             if (item.type === ITEM_TYPES.LINE) return {}; // 直線は枠線なし
             if (!item.borders) return { border: `${item.strokeWidth || 1}px solid ${item.strokeColor || '#475569'}` };
             return {
                 borderTop: `${item.borders.top?.width || 0}px ${item.borders.top?.style || 'solid'} ${item.borders.top?.color || 'transparent'}`,
                 borderBottom: `${item.borders.bottom?.width || 0}px ${item.borders.bottom?.style || 'solid'} ${item.borders.bottom?.color || 'transparent'}`,
                 borderLeft: `${item.borders.left?.width || 0}px ${item.borders.left?.style || 'solid'} ${item.borders.left?.color || 'transparent'}`,
                 borderRight: `${item.borders.right?.width || 0}px ${item.borders.right?.style || 'solid'} ${item.borders.right?.color || 'transparent'}`,
             };
          };

          const primarySelected = allItems.find(i => i.id === selectedItemIds[0]);

          return (
            <div className="flex h-screen w-full flex-col bg-gray-50 overflow-hidden font-sans">
              
              {/* --- パワポ風 リボンUI ヘッダー --- */}
              <div className="flex flex-col bg-white border-b shadow-sm z-20 shrink-0 select-none">
                 <div className="flex px-4 pt-2 bg-[#0078d4]">
                    <div className="flex items-center text-white font-bold text-sm mr-6">
                      <span className="mr-2 text-xl">🏢</span> Layout Master
                    </div>
                    <div className="px-4 py-1.5 bg-white text-[#0078d4] text-xs font-bold rounded-t-md shadow-[0_-2px_5px_rgba(0,0,0,0.1)]">ホーム</div>
                 </div>
                 
                 <div className="flex items-start px-2 py-1 space-x-4 overflow-x-auto min-h-[90px]">
                    <div className="flex flex-col h-full border-r border-gray-200 pr-4">
                        <div className="flex flex-1 items-center space-x-1">
                            <button onClick={handleUndo} disabled={past.length===0} className="ribbon-btn"><span className="ribbon-icon">↩️</span><span className="ribbon-label">元に戻す</span></button>
                            <button onClick={handleRedo} disabled={future.length===0} className="ribbon-btn"><span className="ribbon-icon">↪️</span><span className="ribbon-label">やり直し</span></button>
                            <div className="w-px h-8 bg-gray-200 mx-1"></div>
                            <button onClick={duplicateSelectedItems} disabled={selectedItemIds.length===0} className="ribbon-btn"><span className="ribbon-icon">📋</span><span className="ribbon-label">コピー(複製)</span></button>
                            <button onClick={deleteSelectedItems} disabled={selectedItemIds.length===0} className="ribbon-btn"><span className="ribbon-icon">✂️</span><span className="ribbon-label">削除</span></button>
                        </div>
                        <span className="text-[10px] text-gray-400 mt-auto text-center w-full block font-medium pb-1">編集</span>
                    </div>

                    <div className="flex flex-col h-full border-r border-gray-200 pr-4">
                        <div className="flex flex-1 items-center space-x-1">
                            <button onClick={()=>setPlacementMode(ITEM_TYPES.ROOM)} className={`ribbon-btn ${placementMode===ITEM_TYPES.ROOM?'active':''}`}><span className="ribbon-icon">🔲</span><span className="ribbon-label">部屋</span></button>
                            <button onClick={()=>setPlacementMode(ITEM_TYPES.WALL)} className={`ribbon-btn ${placementMode===ITEM_TYPES.WALL?'active':''}`}><span className="ribbon-icon grayscale opacity-80">⬛</span><span className="ribbon-label">壁・柱</span></button>
                            <button onClick={()=>setPlacementMode(ITEM_TYPES.RECT)} className={`ribbon-btn ${placementMode===ITEM_TYPES.RECT?'active':''}`}><span className="ribbon-icon">🟦</span><span className="ribbon-label">新規作成</span></button>
                            <button onClick={()=>setPlacementMode(ITEM_TYPES.DOOR)} className={`ribbon-btn ${placementMode===ITEM_TYPES.DOOR?'active':''}`}><span className="ribbon-icon">🚪</span><span className="ribbon-label">扉</span></button>
                            <button onClick={()=>setPlacementMode(ITEM_TYPES.TEXT)} className={`ribbon-btn ${placementMode===ITEM_TYPES.TEXT?'active':''}`}><span className="ribbon-icon">🔤</span><span className="ribbon-label">テキスト</span></button>
                            <div className="w-px h-8 bg-gray-200 mx-1"></div>
                            {/* 直線ツールを追加 */}
                            <button onClick={()=>setPlacementMode(ITEM_TYPES.LINE)} className={`ribbon-btn ${placementMode===ITEM_TYPES.LINE?'active':''}`}><span className="ribbon-icon text-gray-600"><LineIcon/></span><span className="ribbon-label">直線</span></button>
                        </div>
                        <span className="text-[10px] text-gray-400 mt-auto text-center w-full block font-medium pb-1">図形・アイテムの挿入</span>
                    </div>

                    <div className="flex flex-col h-full border-r border-gray-200 pr-4 justify-center">
                        <div className="grid grid-cols-4 gap-1">
                            <button onClick={()=>handleAlign('left')} disabled={selectedItemIds.length<2} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="左揃え(L)"><AlignIcon type="left" /></button>
                            <button onClick={()=>handleAlign('center')} disabled={selectedItemIds.length<2} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="左右中央揃え(C)"><AlignIcon type="center" /></button>
                            <button onClick={()=>handleAlign('right')} disabled={selectedItemIds.length<2} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="右揃え(R)"><AlignIcon type="right" /></button>
                            <button onClick={()=>handleAlign('distribute-h')} disabled={selectedItemIds.length<3} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="左右に整列(H)"><AlignIcon type="dist-h" /></button>
                            
                            <button onClick={()=>handleAlign('top')} disabled={selectedItemIds.length<2} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="上揃え(T)"><AlignIcon type="top" /></button>
                            <button onClick={()=>handleAlign('middle')} disabled={selectedItemIds.length<2} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="上下中央揃え(M)"><AlignIcon type="middle" /></button>
                            <button onClick={()=>handleAlign('bottom')} disabled={selectedItemIds.length<2} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="下揃え(B)"><AlignIcon type="bottom" /></button>
                            <button onClick={()=>handleAlign('distribute-v')} disabled={selectedItemIds.length<3} className="p-1.5 border rounded bg-white hover:bg-blue-50 text-gray-600 disabled:opacity-30 disabled:hover:bg-white" title="上下に整列(V)"><AlignIcon type="dist-v" /></button>
                        </div>
                        <span className="text-[10px] text-gray-400 mt-1 text-center w-full block font-medium">配置 (複数選択時)</span>
                    </div>

                    <div className="flex flex-col h-full border-r border-gray-200 pr-4">
                        <div className="flex flex-1 items-center space-x-2">
                            <button onClick={() => bgInputRef.current.click()} className="ribbon-btn">
                               <span className="ribbon-icon">🖼️</span><span className="ribbon-label text-blue-600 font-bold">画像読込</span>
                            </button>
                            <input type="file" accept="image/*" ref={bgInputRef} onChange={handleBgImageUpload} className="hidden" />
                            
                            {bgImage && (
                                <div className="flex flex-col justify-center space-y-1">
                                   <div className="flex items-center text-[11px]">
                                     <span className="text-gray-500 w-8 font-medium">濃さ</span>
                                     <input type="range" min="0.1" max="1" step="0.1" value={bgOpacity === '' ? 0.5 : bgOpacity} onChange={e => setBgOpacity(parseFloat(e.target.value))} className="w-16 accent-blue-600" />
                                     <input type="number" min="10" max="100" step="10" value={bgOpacity === '' ? '' : Math.round(bgOpacity * 100)} onChange={e => setBgOpacity(e.target.value === '' ? '' : Math.max(10, Math.min(100, parseInt(e.target.value))) / 100)} className="w-12 ml-1 px-1 border rounded outline-none text-center" /> <span className="text-gray-500">%</span>
                                   </div>
                                   <div className="flex items-center text-[11px]">
                                     <span className="text-gray-500 w-8 font-medium">倍率</span>
                                     <input type="range" min="10" max="2000" step="10" value={bgScale === '' ? 100 : bgScale} onChange={e => setBgScale(parseInt(e.target.value))} className="w-16 accent-blue-600" />
                                     <input type="number" min="10" max="2000" value={bgScale === '' ? '' : bgScale} onChange={e => setBgScale(e.target.value === '' ? '' : parseInt(e.target.value))} className="w-12 ml-1 px-1 border rounded outline-none text-center" /> <span className="text-gray-500">%</span>
                                   </div>
                                </div>
                            )}
                            {bgImage && <button onClick={() => setBgImage(null)} className="ribbon-btn ml-1"><span className="ribbon-icon text-red-500">❌</span><span className="ribbon-label">削除</span></button>}
                        </div>
                        <span className="text-[10px] text-gray-400 mt-auto text-center w-full block font-medium pb-1">下敷き画像</span>
                    </div>

                    <div className="flex flex-col h-full pr-4">
                        <div className="flex flex-1 items-center space-x-1">
                            <button onClick={() => fileInputRef.current.click()} className="ribbon-btn"><span className="ribbon-icon text-green-600">📂</span><span className="ribbon-label text-green-700">開く</span></button>
                            <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportJSON} className="hidden" />
                            <button onClick={handleExportJSON} className="ribbon-btn"><span className="ribbon-icon text-blue-600">💾</span><span className="ribbon-label text-blue-700">データ保存</span></button>
                            <button onClick={handleExportImage} disabled={isExportingPDF} className="ribbon-btn"><span className="ribbon-icon text-purple-600">{isExportingPDF ? '⏳' : '🖼️'}</span><span className="ribbon-label text-purple-700">{isExportingPDF ? '処理中...' : '画像出力'}</span></button>
                            <button onClick={handleExportPDF} disabled={isExportingPDF} className="ribbon-btn"><span className="ribbon-icon text-red-600">{isExportingPDF ? '⏳' : '📄'}</span><span className="ribbon-label text-red-700">{isExportingPDF ? '出力中...' : 'PDF出力'}</span></button>
                        </div>
                        <span className="text-[10px] text-gray-400 mt-auto text-center w-full block font-medium pb-1">ファイル保存・出力</span>
                    </div>
                 </div>
              </div>

              <div className="flex flex-1 overflow-hidden">
                {/* Left Sidebar */}
                <aside className="w-64 flex-shrink-0 flex flex-col border-r bg-white z-10">
                  <div className="p-4 border-b">
                    <div className="flex items-center justify-between mb-2">
                      <h3 className="font-semibold text-gray-700 text-xs">フロア一覧</h3>
                      <button onClick={() => { 
                        const newFloor = { id: Date.now().toString(), name: `新規フロア`, order: floors.length };
                        saveFloors([...floors, newFloor]);
                        setCurrentFloorId(newFloor.id);
                      }} className="text-blue-600 hover:bg-blue-50 px-2 rounded font-bold">+</button>
                    </div>
                    <ul className="space-y-1">
                      {floors.map(floor => (
                        <li key={floor.id} className="group flex items-center">
                          {editingFloorId === floor.id ? (
                            <input type="text" autoFocus value={editFloorName} onChange={e => setEditFloorName(e.target.value)} onKeyDown={e => { if(e.key === 'Enter') { if(editFloorName.trim()) saveFloors(floors.map(f => f.id === editingFloorId ? { ...f, name: editFloorName.trim() } : f)); setEditingFloorId(null); } }} onBlur={() => {if(editFloorName.trim()) saveFloors(floors.map(f => f.id === editingFloorId ? { ...f, name: editFloorName.trim() } : f)); setEditingFloorId(null);}} className="w-full text-xs p-1 border outline-none ring-1 ring-blue-500" />
                          ) : (
                            <>
                              <button onClick={() => setCurrentFloorId(floor.id)} className={`flex-1 text-left px-2 py-1.5 rounded text-xs truncate ${currentFloorId === floor.id ? 'bg-blue-100 text-blue-800 font-bold' : 'hover:bg-gray-100 text-gray-700'}`}>{floor.name}</button>
                              <button onClick={() => { setEditingFloorId(floor.id); setEditFloorName(floor.name); }} className="px-1 text-xs opacity-0 group-hover:opacity-100 text-gray-500 hover:text-blue-600">✏️</button>
                              <button onClick={(e) => {
                                e.stopPropagation();
                                if(window.confirm('このフロアを削除しますか？')) {
                                  const newFloors = floors.filter(f => f.id !== floor.id);
                                  saveFloors(newFloors);
                                  saveAllItems(allItems.filter(i => i.floorId !== floor.id));
                                  if (currentFloorId === floor.id) setCurrentFloorId(newFloors.length > 0 ? newFloors[0].id : null);
                                  setPast([]); setFuture([]);
                                }
                              }} className="px-1 text-xs opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-600">❌</button>
                            </>
                          )}
                        </li>
                      ))}
                    </ul>
                  </div>
                  
                  {/* レイヤーグループ */}
                  <div className="flex-1 overflow-y-auto p-2 bg-gray-100">
                     <div className="flex justify-between items-center mb-2 px-1">
                       <h3 className="font-bold text-gray-500 text-[10px] uppercase tracking-wider">レイヤー / アイテム</h3>
                       <button onClick={() => {
                          const newGroup = { id: `group_${Date.now()}`, name: `新規レイヤー` };
                          saveGroups([newGroup, ...itemGroups]);
                          setExpandedGroups([...expandedGroups, newGroup.id]);
                       }} className="text-blue-600 hover:bg-blue-100 px-1.5 py-0.5 rounded text-[10px] font-bold">+ グループ</button>
                     </div>
                     <p className="text-[9px] text-gray-400 mb-2 px-1">※ドラッグで移動・並べ替えができます</p>
                     
                     <div className="space-y-1.5">
                       {itemGroups.map(group => {
                         const groupItems = displayItems.filter(i => (i.groupId || (i.type==='room'?'group_room':i.type==='wall'?'group_wall':'group_object')) === group.id);
                         const isExpanded = expandedGroups.includes(group.id);
                         
                         return (
                           <div 
                             key={group.id} 
                             draggable
                             onDragStart={(e) => handleDragStartGroup(e, group.id)}
                             onDragOver={(e) => { e.preventDefault(); setDragOverGroupId(group.id); }}
                             onDragLeave={() => setDragOverGroupId(null)}
                             onDrop={(e) => handleDropGroupOrItem(e, group.id)}
                             className={`bg-white border rounded shadow-sm overflow-hidden transition-all ${dragOverGroupId === group.id ? 'ring-2 ring-blue-500 border-blue-500' : 'border-gray-300'}`}
                           >
                             <div 
                               className="bg-gray-200 px-2 py-1 flex justify-between items-center cursor-move select-none"
                               onClick={() => setExpandedGroups(prev => isExpanded ? prev.filter(id => id !== group.id) : [...prev, group.id])}
                             >
                               {editingGroupId === group.id ? (
                                 <input type="text" autoFocus value={editGroupName} onChange={e => setEditGroupName(e.target.value)} onKeyDown={e => {if(e.key === 'Enter' && editGroupName.trim()) { saveGroups(itemGroups.map(g => g.id === editingGroupId ? { ...g, name: editGroupName.trim() } : g)); setEditingGroupId(null);}}} onBlur={() => {if(editGroupName.trim()) { saveGroups(itemGroups.map(g => g.id === editingGroupId ? { ...g, name: editGroupName.trim() } : g)); setEditingGroupId(null);}}} className="w-full text-[11px] p-0.5 outline-none" onClick={e => e.stopPropagation()} />
                               ) : (
                                 <div className="flex items-center flex-1 truncate">
                                   <span className="text-gray-500 mr-1 text-[8px] w-3 text-center">{isExpanded ? '▼' : '▶'}</span>
                                   <FolderIcon />
                                   <span className="text-[11px] font-bold text-gray-700 truncate">{group.name}</span>
                                   <span className="text-[9px] text-gray-400 ml-1">({groupItems.length})</span>
                                 </div>
                               )}
                               <div className="flex space-x-0.5" onClick={e => e.stopPropagation()}>
                                 <button onClick={() => { setEditingGroupId(group.id); setEditGroupName(group.name); }} className="text-[10px] text-gray-400 hover:text-blue-600 px-1">✏️</button>
                                 {itemGroups.length > 1 && (
                                   <button onClick={() => {
                                     if(window.confirm('このレイヤーと含まれる全てのアイテムを削除しますか？')) {
                                       saveAllItems(allItems.filter(i => (i.groupId || (i.type==='room'?'group_room':i.type==='wall'?'group_wall':'group_object')) !== group.id));
                                       saveGroups(itemGroups.filter(g => g.id !== group.id));
                                     }
                                   }} className="text-[10px] text-gray-400 hover:text-red-600 px-1">❌</button>
                                 )}
                               </div>
                             </div>
                             
                             {isExpanded && (
                               <ul className={`p-1 space-y-0.5 min-h-[16px] ${groupItems.length === 0 ? 'bg-gray-50' : ''}`}>
                                 {groupItems.map(item => (
                                   <li 
                                     key={item.id} 
                                     draggable
                                     onDragStart={(e) => handleDragStartItem(e, item.id)}
                                     onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); setDragOverItemId(item.id); }}
                                     onDragLeave={() => setDragOverItemId(null)}
                                     onDrop={(e) => handleDropItem(e, group.id, item.id)}
                                     className={`group flex items-center border-t-2 ${dragOverItemId === item.id ? 'border-t-blue-500' : 'border-transparent'}`}
                                   >
                                     <button onClick={(e) => {
                                       if(e.ctrlKey || e.metaKey) setSelectedItemIds(prev => prev.includes(item.id) ? prev.filter(id => id !== item.id) : [...prev, item.id]);
                                       else setSelectedItemIds([item.id]);
                                     }} className={`flex-1 text-left px-1.5 py-1 rounded text-[11px] truncate cursor-move ${selectedItemIds.includes(item.id) ? 'bg-blue-100 text-blue-800 font-bold' : 'text-gray-600 hover:bg-gray-100'}`}>
                                       {item.type === ITEM_TYPES.ROOM ? `[部屋] ${item.text}` : item.type === ITEM_TYPES.DOOR ? `[扉]` : item.type === ITEM_TYPES.LINE ? `[直線]` : item.text || '図形'}
                                     </button>
                                     
                                     <button onClick={(e) => { e.stopPropagation(); updateItem(item.id, { isHidden: !item.isHidden }); }} className={`p-1 rounded transition-colors mr-0.5 ${item.isHidden ? 'text-gray-400 bg-gray-100' : 'text-gray-500 hover:bg-gray-200 opacity-0 group-hover:opacity-100'}`} title={item.isHidden ? "表示する" : "隠す"}>
                                       {item.isHidden ? <EyeOffIcon/> : <EyeIcon/>}
                                     </button>
          
                                     <button onClick={(e) => { e.stopPropagation(); updateItem(item.id, { isLocked: !item.isLocked }); }} className={`p-1 rounded transition-colors ${item.isLocked ? 'text-red-500 hover:bg-red-50' : 'text-gray-500 hover:bg-gray-200 opacity-0 group-hover:opacity-100'}`} title={item.isLocked ? "ロック解除" : "ロックする"}>
                                       {item.isLocked ? <LockIcon/> : <UnlockIcon/>}
                                     </button>
                                   </li>
                                 ))}
                               </ul>
                             )}
                           </div>
                         );
                       })}
                     </div>
                  </div>
                </aside>

                {/* Center Canvas */}
                <div className="flex-1 relative flex flex-col bg-[#e5e5f7] min-w-0">
                  <main ref={mainRef} className={`flex-1 overflow-auto ${placementMode ? 'cursor-crosshair' : ''}`} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
                    <div style={{ width: `${10000 * zoom}px`, height: `${10000 * zoom}px`, position: 'relative' }}>
                      <div ref={canvasRef} 
                        className="absolute top-0 left-0 bg-white"
                        style={{ 
                          width: '10000px', height: '10000px', transform: `scale(${zoom})`, transformOrigin: 'top left',
                          backgroundImage: 'linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px)', 
                          backgroundSize: '10px 10px', boxShadow: '0 0 20px rgba(0,0,0,0.05)'
                        }}
                        onMouseDown={handleCanvasMouseDown}
                      >
                        {/* 背景画像 */}
                        {bgImage && (
                          <img src={bgImage} alt="bg" 
                               style={{ position:'absolute', left:0, top:0, transform: `scale(${(bgScale || 100)/100})`, transformOrigin:'top left', opacity: bgOpacity === '' ? 0.5 : bgOpacity, pointerEvents:'none', zIndex: 0 }} />
                        )}

                        {displayItems.map(item => {
                          if (item.isHidden) return null; 
                          
                          const isSelected = selectedItemIds.includes(item.id);
                          return (
                          <div key={item.id} onMouseDown={(e) => handleItemMouseDown(e, item, 'move')}
                            className={`absolute ${item.isLocked ? '' : 'cursor-move'}`}
                            style={{
                              left: item.x, top: item.y, width: item.width || 10, height: item.type === ITEM_TYPES.LINE ? Math.max(0.1, item.height || 1) : (item.height || 10),
                              backgroundColor: (item.type === ITEM_TYPES.DOOR || item.type === ITEM_TYPES.LINE) ? 'transparent' : item.color, 
                              opacity: (item.opacity === undefined || item.opacity === '') ? 1 : item.opacity,
                              ...getBorderStyleObj(item),
                              transform: `rotate(${item.rotation || 0}deg) scaleX(${item.flipX ? -1 : 1}) scaleY(${item.flipY ? -1 : 1})`, 
                              transformOrigin: item.type === ITEM_TYPES.LINE ? 'left center' : 'center center',
                              display: 'flex', alignItems: item.verticalAlign || 'center', justifyContent: item.textAlign === 'center' ? 'center' : item.textAlign === 'left' ? 'flex-start' : 'flex-end', 
                              padding: (item.type === ITEM_TYPES.DOOR || item.type === ITEM_TYPES.LINE) ? 0 : '4px', overflow: item.type === ITEM_TYPES.LINE ? 'visible' : 'hidden', zIndex: getZIndex(item),
                              pointerEvents: item.isLocked && !isSelected ? 'none' : 'auto',
                              boxShadow: isSelected ? '0 0 0 2px #3b82f6, 0 4px 6px -1px rgba(0, 0, 0, 0.3)' : 'none'
                            }}
                          >
                            {/* --- 直線の描画 --- */}
                            {item.type === ITEM_TYPES.LINE && (
                                <div style={{
                                    position: 'absolute',
                                    top: 0,
                                    left: 0,
                                    width: '100%',
                                    borderTop: `${item.height || 1}px solid ${item.color}`,
                                    pointerEvents: 'none'
                                }} />
                            )}

                            {/* --- 扉の描画 --- */}
                            {item.type === ITEM_TYPES.DOOR && (
                                <svg width="100%" height="100%" preserveAspectRatio="none" style={{pointerEvents:'none'}}>
                                   {(!item.doorType || item.doorType === 'single') && (
                                       <React.Fragment>
                                           <path d={`M 0,${item.height} L 0,0 A ${item.width},${item.height} 0 0,1 ${item.width},${item.height} Z`} fill="rgba(0,0,0,0.05)" stroke={item.borders?.top?.color || '#475569'} strokeWidth={1} strokeDasharray="4,4" />
                                           <line x1="0" y1={item.height} x2="0" y2="0" stroke={item.borders?.left?.color || '#cbd5e1'} strokeWidth={Math.max(4, (item.borders?.left?.width || 1) * 2)} />
                                       </React.Fragment>
                                   )}
                                   {item.doorType === 'double' && (
                                       <React.Fragment>
                                           <path d={`M 0,${item.height} L 0,0 A ${item.width/2},${item.height} 0 0,1 ${item.width/2},${item.height} Z`} fill="rgba(0,0,0,0.05)" stroke={item.borders?.top?.color || '#475569'} strokeWidth={1} strokeDasharray="4,4" />
                                           <path d={`M ${item.width},${item.height} L ${item.width},0 A ${item.width/2},${item.height} 0 0,0 ${item.width/2},${item.height} Z`} fill="rgba(0,0,0,0.05)" stroke={item.borders?.top?.color || '#475569'} strokeWidth={1} strokeDasharray="4,4" />
                                           <line x1="0" y1={item.height} x2="0" y2="0" stroke={item.borders?.left?.color || '#cbd5e1'} strokeWidth={Math.max(4, (item.borders?.left?.width || 1) * 2)} />
                                           <line x1={item.width} y1={item.height} x2={item.width} y2="0" stroke={item.borders?.right?.color || '#cbd5e1'} strokeWidth={Math.max(4, (item.borders?.right?.width || 1) * 2)} />
                                       </React.Fragment>
                                   )}
                                   {item.doorType === 'sliding' && (
                                       <React.Fragment>
                                           <rect x="0" y={item.height * 0.25} width={item.width} height={item.height * 0.5} fill="rgba(255,255,255,0.9)" />
                                           <line x1="0" y1="0" x2="0" y2={item.height} stroke={item.borders?.left?.color || '#475569'} strokeWidth={2} />
                                           <line x1={item.width} y1="0" x2={item.width} y2={item.height} stroke={item.borders?.right?.color || '#475569'} strokeWidth={2} />
                                           <line x1="0" y1={item.height * 0.4} x2={item.width * 0.55} y2={item.height * 0.4} stroke={item.borders?.top?.color || '#3b82f6'} strokeWidth={Math.max(3, (item.borders?.top?.width || 1) * 2)} />
                                           <line x1={item.width * 0.45} y1={item.height * 0.6} x2={item.width} y2={item.height * 0.6} stroke={item.borders?.bottom?.color || '#3b82f6'} strokeWidth={Math.max(3, (item.borders?.bottom?.width || 1) * 2)} />
                                       </React.Fragment>
                                   )}
                                </svg>
                            )}

                            {isSelected && !item.isLocked && selectedItemIds.length === 1 && (
                              <div className="absolute bg-white border rounded-full flex items-center justify-center cursor-pointer shadow select-none text-xs text-gray-600" 
                                   style={{ 
                                     left: '50%',
                                     top: item.type === ITEM_TYPES.LINE ? '-24px' : '-32px',
                                     width: '24px', height: '24px',
                                     transform: `translateX(-50%) scale(${1 / zoom})`,
                                     transformOrigin: 'bottom center'
                                   }}
                                   onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); handleItemMouseDown(e, item, 'rotate'); }}>↻</div>
                            )}
                            
                            {item.type !== ITEM_TYPES.DOOR && item.type !== ITEM_TYPES.LINE && (
                                <span style={{ color: item.textColor || '#1f2937', fontSize: `${item.fontSize || 16}px`, textAlign: item.textAlign || 'center', whiteSpace: 'pre-wrap', wordBreak: 'break-word', pointerEvents: 'none', width: '100%' }}>
                                  {item.text}
                                </span>
                            )}

                            {isSelected && !item.isLocked && selectedItemIds.length === 1 && (
                               item.type === ITEM_TYPES.LINE ? (
                                 <div className="absolute bg-white border-2 border-blue-500 rounded-full cursor-e-resize" 
                                      style={{
                                        right: '-8px', top: '50%', width: '16px', height: '16px',
                                        transform: `translateY(-50%) scale(${1 / zoom})`,
                                        transformOrigin: 'center center'
                                      }}
                                      onMouseDown={(e) => handleItemMouseDown(e, item, 'resize')} />
                               ) : (
                                 <div className="absolute bg-white border-2 border-blue-500 rounded-full cursor-nwse-resize" 
                                      style={{
                                        right: '-8px', bottom: '-8px', width: '16px', height: '16px',
                                        transform: `scale(${1 / zoom})`,
                                        transformOrigin: 'center center'
                                      }}
                                      onMouseDown={(e) => handleItemMouseDown(e, item, 'resize')} />
                               )
                            )}
                          </div>
                        )})}

                        {selectionBox && (
                            <div className="absolute border border-blue-500 bg-blue-100/30"
                                 style={{ left: Math.min(selectionBox.startX, selectionBox.endX), top: Math.min(selectionBox.startY, selectionBox.endY), width: Math.abs(selectionBox.endX - selectionBox.startX), height: Math.abs(selectionBox.endY - selectionBox.startY), pointerEvents: 'none', zIndex: 9999 }} />
                        )}
                      </div>
                    </div>
                  </main>

                  <div className="absolute bottom-6 right-6 flex items-center bg-white/90 backdrop-blur shadow-lg rounded-full border border-gray-200 p-1.5 space-x-1 z-40 pointer-events-auto">
                    <button onClick={() => setZoom(Math.max(0.1, zoom - 0.1))} className="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-full text-gray-600 font-bold">－</button>
