                    <span className="px-2 py-1 text-xs text-gray-600 font-bold w-12 text-center cursor-pointer hover:bg-gray-100 rounded" onClick={() => setZoom(1)} title="100%に戻す">{Math.round(zoom * 100)}%</span>
                    <button onClick={() => setZoom(Math.min(5, zoom + 0.1))} className="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-full text-gray-600 font-bold">＋</button>
                  </div>
                </div>

                {/* Right Sidebar: Properties */}
                <aside className="w-72 flex-shrink-0 flex flex-col border-l bg-white z-10 overflow-y-auto">
                  {primarySelected ? (
                    <div className="p-4 space-y-4">
                      <div className="flex justify-between items-center border-b pb-2">
                        <h3 className="font-bold text-gray-800 text-sm">書式設定 ({selectedItemIds.length}選択中)</h3>
                        <div className="flex space-x-1">
                          <button onClick={(e) => updateSelectedItems({ isHidden: !primarySelected.isHidden })} className="text-[10px] px-2 py-1 bg-gray-100 hover:bg-gray-200 font-bold text-gray-700 rounded transition-colors" title={primarySelected.isHidden ? '表示する' : '隠す'}>{primarySelected.isHidden ? '👁️‍🗨️ 表示' : '👁️ 隠す'}</button>
                          <button onClick={(e) => updateSelectedItems({ isLocked: !primarySelected.isLocked })} className="text-[10px] px-2 py-1 bg-gray-100 hover:bg-gray-200 font-bold text-gray-700 rounded transition-colors" title={primarySelected.isLocked ? 'ロック解除' : 'ロックする'}>{primarySelected.isLocked ? '🔓 解除' : '🔒 ロック'}</button>
                        </div>
                      </div>
                      
                      {/* 枠線設定 (LINEは非表示) */}
                      {primarySelected.type !== ITEM_TYPES.TEXT && primarySelected.type !== ITEM_TYPES.DOOR && primarySelected.type !== ITEM_TYPES.LINE && (
                          <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                             <h4 className="text-xs font-bold text-slate-700 mb-2">線のスタイル（辺ごと）</h4>
                             <div className="flex space-x-1 mb-2 bg-white rounded border p-0.5">
                                <button onClick={()=>setTargetEdge('all')} className={`flex-1 py-1 text-xs font-medium rounded edge-btn ${targetEdge==='all'?'active':'text-gray-600'}`}>全体</button>
                                <button onClick={()=>setTargetEdge('top')} className={`flex-1 py-1 text-xs font-medium rounded edge-btn ${targetEdge==='top'?'active':'text-gray-600'}`}>上</button>
                                <button onClick={()=>setTargetEdge('bottom')} className={`flex-1 py-1 text-xs font-medium rounded edge-btn ${targetEdge==='bottom'?'active':'text-gray-600'}`}>下</button>
                                <button onClick={()=>setTargetEdge('left')} className={`flex-1 py-1 text-xs font-medium rounded edge-btn ${targetEdge==='left'?'active':'text-gray-600'}`}>左</button>
                                <button onClick={()=>setTargetEdge('right')} className={`flex-1 py-1 text-xs font-medium rounded edge-btn ${targetEdge==='right'?'active':'text-gray-600'}`}>右</button>
                             </div>
                             <div className="flex space-x-2 items-center">
                                <select onChange={(e)=>handleBorderChange('style', e.target.value)} className="text-xs p-1.5 border rounded w-1/2 bg-white" value={primarySelected.borders?.[targetEdge==='all'?'top':targetEdge]?.style || 'solid'}>
                                   <option value="solid">実線</option>
                                   <option value="dashed">破線</option>
                                   <option value="double">二重線</option>
                                </select>
                                <div className="flex items-center bg-white border rounded pr-2 w-1/2">
                                  <input type="number" min="0" max="20" onChange={(e)=>handleBorderChange('width', e.target.value === '' ? '' : parseInt(e.target.value))} value={primarySelected.borders?.[targetEdge==='all'?'top':targetEdge]?.width === '' ? '' : (primarySelected.borders?.[targetEdge==='all'?'top':targetEdge]?.width || 0)} className="w-full text-xs p-1.5 outline-none bg-transparent" />
                                  <span className="text-[10px] text-gray-500 font-medium">px</span>
                                </div>
                             </div>
                          </div>
                      )}

                      {/* 扉専用プロパティ */}
                      {primarySelected.type === ITEM_TYPES.DOOR && (
                          <div className="bg-orange-50 p-3 rounded-lg border border-orange-100">
                            <h4 className="text-xs font-bold text-orange-800 mb-2">扉の設定</h4>
                            
                            <div className="flex space-x-1 mb-3 bg-white rounded border p-0.5">
                               <button onClick={()=>updateSelectedItems({ doorType: 'single' })} className={`flex-1 py-1 text-xs font-medium rounded door-btn ${(!primarySelected.doorType || primarySelected.doorType==='single')?'active':'text-gray-600 border-transparent'}`}>片開き</button>
                               <button onClick={()=>updateSelectedItems({ doorType: 'double' })} className={`flex-1 py-1 text-xs font-medium rounded door-btn ${primarySelected.doorType==='double'?'active':'text-gray-600 border-transparent'}`}>両開き</button>
                               <button onClick={()=>updateSelectedItems({ doorType: 'sliding' })} className={`flex-1 py-1 text-xs font-medium rounded door-btn ${primarySelected.doorType==='sliding'?'active':'text-gray-600 border-transparent'}`}>引き戸</button>
                            </div>

                            <h5 className="text-[10px] font-bold text-orange-800 mb-1">開き方・向きの反転</h5>
                            <div className="flex space-x-2">
                              <button onClick={() => updateSelectedItems({ flipX: !primarySelected.flipX })} className={`w-1/2 px-2 py-1.5 text-xs font-bold border rounded ${primarySelected.flipX ? 'bg-orange-200 border-orange-300 text-orange-900' : 'bg-white text-gray-600'}`}>左右反転</button>
                              <button onClick={() => updateSelectedItems({ flipY: !primarySelected.flipY })} className={`w-1/2 px-2 py-1.5 text-xs font-bold border rounded ${primarySelected.flipY ? 'bg-orange-200 border-orange-300 text-orange-900' : 'bg-white text-gray-600'}`}>上下反転</button>
                            </div>
                          </div>
                      )}

                      {/* Size & Opacity */}
                      {selectedItemIds.length === 1 && (
                          <div className="space-y-3">
                            <div className="flex space-x-3">
                              <div className="w-1/2">
                                <label className="text-xs text-gray-500 font-medium block mb-1">
                                  {primarySelected.type === ITEM_TYPES.LINE ? '長さ (cm)' : '幅 (cm)'}
                                </label>
                                <input type="number" value={primarySelected.width === '' ? '' : primarySelected.width} onChange={(e) => updateSelectedItems({ width: e.target.value === '' ? '' : parseInt(e.target.value) })} disabled={primarySelected.isLocked} className="w-full px-2 py-1.5 border rounded text-sm disabled:opacity-50 focus:ring-1 focus:ring-blue-500 outline-none" />
                              </div>
                              <div className="w-1/2">
                                <label className="text-xs text-gray-500 font-medium block mb-1">
                                  {primarySelected.type === ITEM_TYPES.LINE ? '太さ (px)' : '高さ (cm)'}
                                </label>
                                {primarySelected.type === ITEM_TYPES.LINE ? (
                                    <input type="number" step="0.1" min="0.1" max="100" value={primarySelected.height === '' ? '' : primarySelected.height} onChange={(e) => updateSelectedItems({ height: e.target.value === '' ? '' : parseFloat(e.target.value) })} disabled={primarySelected.isLocked} className="w-full px-2 py-1.5 border rounded text-sm disabled:opacity-50 focus:ring-1 focus:ring-blue-500 outline-none" />
                                ) : (
                                    <input type="number" value={primarySelected.height === '' ? '' : primarySelected.height} onChange={(e) => updateSelectedItems({ height: e.target.value === '' ? '' : parseInt(e.target.value) })} disabled={primarySelected.isLocked} className="w-full px-2 py-1.5 border rounded text-sm disabled:opacity-50 focus:ring-1 focus:ring-blue-500 outline-none" />
                                )}
                              </div>
                            </div>

                            <div>
                              <label className="text-xs text-gray-500 font-medium block mb-1">不透明度 (濃さ)</label>
                              <div className="flex items-center space-x-2">
                                <input type="range" min="10" max="100" step="10" value={primarySelected.opacity === '' ? 100 : Math.round((primarySelected.opacity ?? 1) * 100)} onChange={(e) => updateSelectedItems({ opacity: parseInt(e.target.value) / 100 })} disabled={primarySelected.isLocked} className="flex-1 accent-blue-600" />
                                <input type="number" min="10" max="100" step="10" value={primarySelected.opacity === '' ? '' : Math.round((primarySelected.opacity ?? 1) * 100)} onChange={(e) => updateSelectedItems({ opacity: e.target.value === '' ? '' : Math.max(10, Math.min(100, parseInt(e.target.value))) / 100 })} disabled={primarySelected.isLocked} className="w-14 px-1 py-1 border rounded text-sm text-center outline-none" />
                                <span className="text-sm text-gray-500">%</span>
                              </div>
                            </div>
                          </div>
                      )}

                      {/* --- 回転 --- */}
                      {selectedItemIds.length === 1 && (
                          <div>
                            <label className="text-xs text-gray-500 font-medium block mb-1">回転角度</label>
                            <div className="flex items-center space-x-2">
                              <input type="range" min="0" max="360" value={primarySelected.rotation === '' ? 0 : (primarySelected.rotation || 0)} onChange={(e) => updateSelectedItems({ rotation: parseInt(e.target.value) })} disabled={primarySelected.isLocked} className="flex-1 accent-blue-600" />
                              <input type="number" min="0" max="360" value={primarySelected.rotation === '' ? '' : (primarySelected.rotation || 0)} onChange={(e) => updateSelectedItems({ rotation: e.target.value === '' ? '' : parseInt(e.target.value) })} disabled={primarySelected.isLocked} className="w-14 px-1 py-1 border rounded text-sm text-center outline-none" />
                              <span className="text-sm text-gray-500">°</span>
                            </div>
                            <div className="flex space-x-2 mt-2">
                               <button onClick={() => updateSelectedItems({ rotation: ((primarySelected.rotation || 0) - 90 + 360) % 360 })} disabled={primarySelected.isLocked} className="flex-1 py-1 text-xs border rounded bg-white hover:bg-gray-50 text-gray-600 disabled:opacity-50">-90°</button>
                               <button onClick={() => updateSelectedItems({ rotation: ((primarySelected.rotation || 0) + 90) % 360 })} disabled={primarySelected.isLocked} className="flex-1 py-1 text-xs border rounded bg-white hover:bg-gray-50 text-gray-600 disabled:opacity-50">+90°</button>
                            </div>
                          </div>
                      )}

                      {/* --- 重なり順変更 --- */}
                      {selectedItemIds.length === 1 && (
                          <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                             <h4 className="text-xs font-bold text-slate-700 mb-2">重なり順 (同レイヤー内)</h4>
                             <div className="flex space-x-1">
                                <button onClick={() => changeOrder('front')} disabled={primarySelected.isLocked} className="flex-1 py-1 text-xs border rounded bg-white hover:bg-blue-50 text-gray-700 font-medium disabled:opacity-50" title="一番手前へ">最前面</button>
                                <button onClick={() => changeOrder('forward')} disabled={primarySelected.isLocked} className="flex-1 py-1 text-xs border rounded bg-white hover:bg-blue-50 text-gray-700 font-medium disabled:opacity-50" title="1つ手前へ">前面へ</button>
                                <button onClick={() => changeOrder('backward')} disabled={primarySelected.isLocked} className="flex-1 py-1 text-xs border rounded bg-white hover:bg-blue-50 text-gray-700 font-medium disabled:opacity-50" title="1つ奥へ">背面へ</button>
                                <button onClick={() => changeOrder('back')} disabled={primarySelected.isLocked} className="flex-1 py-1 text-xs border rounded bg-white hover:bg-blue-50 text-gray-700 font-medium disabled:opacity-50" title="一番奥へ">最背面</button>
                             </div>
                          </div>
                      )}

                      {/* Colors */}
                      <div>
                        {primarySelected.type !== ITEM_TYPES.TEXT && primarySelected.type !== ITEM_TYPES.DOOR && (
                          <div className="mb-3">
                            <span className="text-xs text-gray-500 font-medium block mb-1">
                                {primarySelected.type === ITEM_TYPES.LINE ? '線の色' : '塗りつぶしの色'}
                            </span>
                            <div className="flex flex-wrap gap-1.5">
                              {BASIC_COLORS.map(c => (
                                <button key={'bg'+c} 
                                  onClick={() => updateSelectedItems({ color: c })} 
                                  className={`w-6 h-6 rounded border border-gray-300 shadow-sm hover:scale-110 transition-transform`} 
                                  style={{ backgroundColor: c === 'transparent' ? 'transparent' : c, backgroundImage: c === 'transparent' ? 'url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==)' : 'none' }} 
                                />
                              ))}
                            </div>
                          </div>
                        )}
                        {primarySelected.type !== ITEM_TYPES.DOOR && primarySelected.type !== ITEM_TYPES.LINE && (
                          <div className="mb-2">
                            <span className="text-xs text-gray-500 font-medium block mb-1">文字 / 枠線の色</span>
                            <div className="flex flex-wrap gap-1.5">
                                {BASIC_COLORS.filter(c=>c!=='transparent').map(c => (
                                  <button key={'txt'+c} 
                                    onClick={() => { updateSelectedItems({ textColor: c }); handleBorderChange('color', c); }} 
                                    className="w-6 h-6 rounded border border-gray-300 shadow-sm hover:scale-110 transition-transform" 
                                    style={{ backgroundColor: c }} 
                                  />
                                ))}
                            </div>
                          </div>
                        )}
                      </div>

                      {/* Text & Style */}
                      {primarySelected.type !== ITEM_TYPES.DOOR && primarySelected.type !== ITEM_TYPES.LINE && (
                          <div>
                            <span className="text-xs text-gray-500 font-medium block mb-1">表示するテキストと配置</span>
                            <textarea value={primarySelected.text} onChange={(e) => updateSelectedItems({ text: e.target.value })} className="w-full px-2 py-1.5 border rounded text-sm mb-2 resize-none h-16 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="文字を入力" />
                            <div className="flex justify-between items-center bg-gray-50 border p-1.5 rounded">
                               <div className="flex space-x-1">
                                  <button onClick={() => updateSelectedItems({ textAlign: 'left' })} className={`px-2 py-1 border rounded text-xs font-bold ${primarySelected.textAlign==='left'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:bg-gray-100'}`} title="左揃え">左</button>
                                  <button onClick={() => updateSelectedItems({ textAlign: 'center' })} className={`px-2 py-1 border rounded text-xs font-bold ${primarySelected.textAlign==='center'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:bg-gray-100'}`} title="中央揃え">中</button>
                                  <button onClick={() => updateSelectedItems({ textAlign: 'right' })} className={`px-2 py-1 border rounded text-xs font-bold ${primarySelected.textAlign==='right'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:bg-gray-100'}`} title="右揃え">右</button>
                                </div>
                                <div className="h-4 w-px bg-gray-300 mx-1"></div>
                                <div className="flex space-x-1">
                                  <button onClick={() => updateSelectedItems({ verticalAlign: 'flex-start' })} className={`px-2 py-1 border rounded text-xs font-bold ${primarySelected.verticalAlign==='flex-start'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:bg-gray-100'}`} title="上詰め">上</button>
                                  <button onClick={() => updateSelectedItems({ verticalAlign: 'center' })} className={`px-2 py-1 border rounded text-xs font-bold ${primarySelected.verticalAlign==='center' || !primarySelected.verticalAlign?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:bg-gray-100'}`} title="上下中央">中</button>
                                  <button onClick={() => updateSelectedItems({ verticalAlign: 'flex-end' })} className={`px-2 py-1 border rounded text-xs font-bold ${primarySelected.verticalAlign==='flex-end'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:bg-gray-100'}`} title="下詰め">下</button>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2 mt-2">
                               <span className="text-xs text-gray-500 font-medium">文字サイズ</span>
                               <input type="number" value={primarySelected.fontSize === '' ? '' : (primarySelected.fontSize || 16)} onChange={(e) => updateSelectedItems({ fontSize: e.target.value === '' ? '' : parseInt(e.target.value) })} className="w-16 px-1 py-1 border rounded text-sm outline-none text-center" />
                               <span className="text-[10px] text-gray-500">px</span>
                            </div>
                          </div>
                      )}
                    </div>
                  ) : (
                    <div className="p-8 text-center text-gray-400 mt-10"><div className="text-4xl mx-auto mb-4 opacity-50">👆</div><p className="text-sm font-medium">アイテムを選択</p><p className="text-xs mt-2 opacity-75">Ctrl＋クリックで複数選択</p></div>
                  )}
                </aside>
              </div>
            </div>
          );
        };

        const App = () => <LayoutEditor />;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
