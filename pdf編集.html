<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブラウザPDF編集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind CSSのフォールバック -->
  <script>
    setTimeout(function() {
      if (typeof tailwind === 'undefined') {
        console.warn("Tailwind CSS blocked. Loading fallback...");
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.1/tailwindcss.js';
        document.head.appendChild(script);
      }
    }, 1500);
  </script>

  <!-- PDF.js (PDF読み込み用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- pdf-lib (PDFの結合・抽出・無劣化保存用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <!-- Fabric.js (オブジェクトの選択・リサイズ・描画用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .canvas-container { margin: 0 auto; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -1px rgb(0 0 0 / 0.06); }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-slate-100 text-slate-800 font-sans">

  <!-- ヘッダー -->
  <header class="bg-white px-6 py-4 border-b border-slate-200 flex items-center justify-between z-20 shrink-0 shadow-sm">
    <div>
      <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
        <i class="fa-solid fa-file-pdf text-blue-600"></i> ブラウザPDF編集
      </h1>
      <p class="text-xs text-slate-500 mt-1">隠したい場所を黒塗りし、画像化して安全なPDFとして保存します。</p>
    </div>
    <div class="flex items-center gap-3">
      <button id="savePdfBtn" class="hidden bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-lg font-bold transition-colors shadow-sm items-center gap-2 text-sm">
        <i class="fa-solid fa-download"></i> PDFを保存
      </button>
      <label class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg cursor-pointer font-medium transition-colors inline-flex items-center gap-2 text-sm">
        <i class="fa-solid fa-folder-open"></i> PDFを開く
        <input type="file" id="fileInput" accept="application/pdf" class="hidden">
      </label>
    </div>
  </header>

  <!-- 初期画面 -->
  <div id="initialScreen" class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-4">
    <i class="fa-solid fa-arrow-up-right-from-square text-6xl opacity-20"></i>
    <p class="text-lg font-medium">右上の「PDFを開く」からファイルを読み込んでください</p>
  </div>

  <!-- ワークスペース -->
  <div id="workspace" class="flex-1 flex overflow-hidden hidden relative">
    
    <!-- 左サイドバー -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-10 shadow-[4px_0_15px_rgba(0,0,0,0.03)] shrink-0">
      <div class="p-4 border-b border-slate-200 bg-slate-50">
        <h2 class="font-bold text-slate-700 mb-2">保存対象ページ</h2>
        <label class="flex items-center gap-2 text-sm cursor-pointer hover:text-blue-600 transition-colors w-max">
          <input type="checkbox" id="selectAllPages" checked class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
          <span class="font-medium">すべて選択 / 解除</span>
        </label>
      </div>
      <div id="pageList" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
    </aside>

    <!-- メインエディタ領域 -->
    <main class="flex-1 flex flex-col relative bg-slate-200">
      <div class="bg-white px-6 py-3 border-b border-slate-200 flex items-center gap-5 z-10 shrink-0">
        <div class="flex bg-slate-100 rounded-lg p-1 border border-slate-200 shrink-0">
          <button id="modeDrawBtn" class="px-5 py-2 text-sm rounded-md bg-white shadow-sm font-bold text-blue-600 flex items-center gap-2 transition-all">
            <i class="fa-solid fa-marker"></i> 黒塗りする
          </button>
          <button id="modeEditBtn" class="px-5 py-2 text-sm rounded-md text-slate-600 hover:text-slate-900 font-medium flex items-center gap-2 transition-all border border-transparent">
            <i class="fa-solid fa-arrow-pointer"></i> 選択・調整・削除
          </button>
        </div>
        <div class="text-sm font-medium text-slate-500 flex items-center gap-2 border-l border-slate-200 pl-5">
          <i class="fa-regular fa-keyboard text-lg"></i> 
          <span>選択して <kbd class="bg-slate-50 border border-slate-300 px-2 py-0.5 rounded text-xs text-slate-700 shadow-sm">Delete</kbd> または <kbd class="bg-slate-50 border border-slate-300 px-2 py-0.5 rounded text-xs text-slate-700 shadow-sm">Backspace</kbd> で削除</span>
        </div>
      </div>

      <div id="canvasScrollArea" class="flex-1 overflow-y-auto bg-slate-300 p-8">
        <div id="pagesContainer" class="flex flex-col items-center gap-12 max-w-5xl mx-auto pl-24 pr-4"></div>
      </div>
    </main>
  </div>

  <!-- ローディング -->
  <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/80 z-50 hidden flex-col items-center justify-center text-white backdrop-blur-sm transition-opacity">
    <i class="fa-solid fa-circle-notch fa-spin text-6xl mb-6 text-blue-400"></i>
    <p id="loadingText" class="text-2xl font-bold tracking-wide">処理中...</p>
    <p class="text-slate-300 mt-2 text-sm">※ページ数が多い場合、しばらく時間がかかります</p>
  </div>

  <script>
    // --- 初期設定 ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    let pdfDoc = null; 
    let originalPdfBytes = null; 
    let currentMode = 'draw';
    const fabricCanvases = [];
    const scale = 2.0;

    // --- DOM要素 ---
    const fileInput = document.getElementById('fileInput');
    const initialScreen = document.getElementById('initialScreen');
    const workspace = document.getElementById('workspace');
    const pagesContainer = document.getElementById('pagesContainer');
    const savePdfBtn = document.getElementById('savePdfBtn');
    const pageList = document.getElementById('pageList');
    const selectAllCheckbox = document.getElementById('selectAllPages');
    const modeDrawBtn = document.getElementById('modeDrawBtn');
    const modeEditBtn = document.getElementById('modeEditBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');

    // --- PDF読み込み処理 ---
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file || file.type !== 'application/pdf') {
        alert('PDFファイルを選択してください。');
        return;
      }

      showLoading("PDFを読み込んでいます...");
      const fileReader = new FileReader();
      
      fileReader.onload = async function() {
        try {
          const arrayBuffer = this.result;
          
          // PDF.jsがWeb Worker転送時にバッファを消費（デタッチ）してしまう問題を防ぐため、
          // pdf-lib（保存用）とPDF.js（表示用）でデータを完全に分離してコピーします。
          originalPdfBytes = new Uint8Array(arrayBuffer.slice(0));
          const pdfjsData = new Uint8Array(arrayBuffer.slice(0));
          
          const loadingTask = pdfjsLib.getDocument({
            data: pdfjsData,
            cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
            cMapPacked: true,
            standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/standard_fonts/',
          });
          pdfDoc = await loadingTask.promise;
          
          initialScreen.classList.add('hidden');
          workspace.classList.remove('hidden');
          savePdfBtn.style.display = 'flex';
          
          buildSidebar();
          await loadAllPages();
          
          hideLoading();
          setMode('draw');
        } catch (err) {
          hideLoading();
          alert('PDFの読み込みに失敗しました: ' + err.message);
        }
      };
      fileReader.readAsArrayBuffer(file);
      e.target.value = '';
    });

    // --- サイドバー(ページ一覧)構築 ---
    function buildSidebar() {
      pageList.innerHTML = '';
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between p-3 mb-1 rounded-lg cursor-pointer border-2 border-transparent hover:bg-slate-100 transition-colors';
        item.innerHTML = `
          <label class="flex items-center gap-3 cursor-pointer flex-1">
            <input type="checkbox" class="sidebar-page-checkbox rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" data-page="${i}" checked>
            <span class="font-medium select-none">ページ ${i}</span>
          </label>
        `;
        const cb = item.querySelector('.sidebar-page-checkbox');
        cb.addEventListener('change', (e) => syncCheckboxes(i, e.target.checked));
        item.addEventListener('click', (e) => {
          if(e.target.tagName !== 'INPUT') {
            const targetCanvas = document.getElementById(`page-wrapper-${i}`);
            if(targetCanvas) targetCanvas.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
        pageList.appendChild(item);
      }
      selectAllCheckbox.checked = true;
    }

    function syncCheckboxes(pageNum, isChecked) {
      const sbCb = document.querySelector(`.sidebar-page-checkbox[data-page="${pageNum}"]`);
      const cvCb = document.querySelector(`.canvas-page-checkbox[data-page="${pageNum}"]`);
      if (sbCb) sbCb.checked = isChecked;
      if (cvCb) cvCb.checked = isChecked;
      updateSelectAllCheckbox();
    }

    function updateSelectAllCheckbox() {
      const allCb = document.querySelectorAll('.sidebar-page-checkbox');
      const checkedCb = document.querySelectorAll('.sidebar-page-checkbox:checked');
      selectAllCheckbox.checked = (allCb.length > 0 && allCb.length === checkedCb.length);
    }

    selectAllCheckbox.addEventListener('change', (e) => {
      const isChecked = e.target.checked;
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        syncCheckboxes(i, isChecked);
      }
    });

    // --- 全ページのレンダリング ---
    async function loadAllPages() {
      pagesContainer.innerHTML = '';
      fabricCanvases.length = 0;

      for (let i = 1; i <= pdfDoc.numPages; i++) {
        updateLoadingText(`ページを準備中... (${i} / ${pdfDoc.numPages})`);

        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale: scale });

        const pageWrapper = document.createElement('div');
        pageWrapper.className = 'relative bg-white shadow-lg shrink-0';
        pageWrapper.id = `page-wrapper-${i}`;
        pageWrapper.style.width = `${viewport.width}px`;
        pageWrapper.style.height = `${viewport.height}px`;
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'absolute -left-20 top-0 w-16 flex flex-col items-end gap-2 p-2 z-30';

        const pageLabel = document.createElement('div');
        pageLabel.className = 'text-slate-500 font-bold text-lg';
        pageLabel.textContent = `P.${i}`;

        const checkboxWrapper = document.createElement('label');
        checkboxWrapper.className = 'cursor-pointer flex items-center justify-center p-1.5 hover:bg-slate-200 rounded transition-colors bg-white shadow-sm border border-slate-200';
        
        const canvasCheckbox = document.createElement('input');
        canvasCheckbox.type = 'checkbox';
        canvasCheckbox.checked = true;
        canvasCheckbox.className = 'canvas-page-checkbox w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer';
        canvasCheckbox.dataset.page = i;
        canvasCheckbox.addEventListener('change', (e) => syncCheckboxes(i, e.target.checked));

        checkboxWrapper.appendChild(canvasCheckbox);
        headerDiv.appendChild(pageLabel);
        headerDiv.appendChild(checkboxWrapper);
        pageWrapper.appendChild(headerDiv);

        const canvasEl = document.createElement('canvas');
        canvasEl.id = `page-canvas-${i}`;
        pageWrapper.appendChild(canvasEl);
        
        pagesContainer.appendChild(pageWrapper);

        const renderCanvas = document.createElement('canvas');
        renderCanvas.width = viewport.width;
        renderCanvas.height = viewport.height;
        const ctx = renderCanvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

        const fCanvas = new fabric.Canvas(`page-canvas-${i}`, {
          preserveObjectStacking: true,
          selection: false,
          width: viewport.width,
          height: viewport.height
        });

        await new Promise(resolve => {
          fabric.Image.fromURL(renderCanvas.toDataURL(), function(img) {
            fCanvas.setBackgroundImage(img, fCanvas.renderAll.bind(fCanvas));
            resolve();
          });
        });

        setupFabricEvents(fCanvas);
        fabricCanvases.push(fCanvas);
      }
    }

    // --- Fabricイベント ---
    function setupFabricEvents(fCanvas) {
      let isDragging = false;
      let startPointer = null;
      let activeRect = null;

      fCanvas.on('mouse:down', function(opt) {
        if (currentMode !== 'draw') return;
        if (opt.target) return;
        isDragging = true;
        startPointer = fCanvas.getPointer(opt.e);
        activeRect = new fabric.Rect({
          left: startPointer.x, top: startPointer.y,
          width: 0, height: 0,
          fill: '#1e293b',
          selectable: false, evented: false,
          hasBorders: true, hasControls: true,
          cornerColor: '#3b82f6', borderColor: '#3b82f6',
          transparentCorners: false
        });
        fCanvas.add(activeRect);
      });

      fCanvas.on('mouse:move', function(opt) {
        if (!isDragging || !activeRect) return;
        const pointer = fCanvas.getPointer(opt.e);
        const w = pointer.x - startPointer.x;
        const h = pointer.y - startPointer.y;
        activeRect.set({
          left: w < 0 ? pointer.x : startPointer.x,
          top: h < 0 ? pointer.y : startPointer.y,
          width: Math.abs(w), height: Math.abs(h)
        });
        fCanvas.renderAll();
      });

      fCanvas.on('mouse:up', function() {
        if (!isDragging) return;
        isDragging = false;
        if (activeRect) {
          if (activeRect.width < 5 || activeRect.height < 5) fCanvas.remove(activeRect);
          else activeRect.setCoords();
        }
        activeRect = null;
      });
    }

    // --- UI切替 ---
    function setMode(mode) {
      currentMode = mode;
      
      const activeClass = "px-5 py-2 text-sm rounded-md bg-white shadow-sm font-bold text-blue-600 flex items-center gap-2 transition-all";
      const inactiveClass = "px-5 py-2 text-sm rounded-md text-slate-600 hover:text-slate-900 font-medium flex items-center gap-2 transition-all border border-transparent";
      
      modeDrawBtn.className = mode === 'draw' ? activeClass : inactiveClass;
      modeEditBtn.className = mode === 'edit' ? activeClass : inactiveClass;
      
      applyModeSettings();
    }

    function applyModeSettings() {
      const isDraw = currentMode === 'draw';
      const isEdit = currentMode === 'edit';
      
      fabricCanvases.forEach(fCanvas => {
        fCanvas.getObjects().forEach(obj => {
          obj.set({ selectable: isEdit, evented: isEdit });
        });
        fCanvas.defaultCursor = isDraw ? 'crosshair' : 'default';
        fCanvas.discardActiveObject();
        fCanvas.renderAll();
      });
    }

    modeDrawBtn.addEventListener('click', () => setMode('draw'));
    modeEditBtn.addEventListener('click', () => setMode('edit'));

    function deleteSelected() {
      fabricCanvases.forEach(fCanvas => {
        const activeObjects = fCanvas.getActiveObjects();
        if (activeObjects.length) {
          fCanvas.discardActiveObject();
          activeObjects.forEach(object => fCanvas.remove(object));
        }
      });
    }

    document.addEventListener('keydown', function(e) {
      if (currentMode === 'edit' && (e.key === 'Delete' || e.key === 'Backspace')) {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') deleteSelected();
      }
    });

    function showLoading(text) {
      loadingText.textContent = text;
      loadingOverlay.classList.remove('hidden');
      loadingOverlay.classList.add('flex');
    }
    function hideLoading() {
      loadingOverlay.classList.add('hidden');
      loadingOverlay.classList.remove('flex');
    }
    function updateLoadingText(text) {
      loadingText.textContent = text;
    }

    // --- 保存処理 (スマート結合: 黒塗りありは画像化、なしは元のまま) ---
    savePdfBtn.addEventListener('click', async () => {
      const checkedCbs = document.querySelectorAll('.sidebar-page-checkbox:checked');
      const pagesToSave = Array.from(checkedCbs).map(cb => parseInt(cb.dataset.page)).sort((a,b) => a-b);

      if (pagesToSave.length === 0) {
        alert('保存するページが選択されていません。');
        return;
      }

      showLoading(`PDFを生成中...`);
      
      try {
        const { PDFDocument } = PDFLib;
        const newPdf = await PDFDocument.create();
        const srcPdf = await PDFDocument.load(originalPdfBytes);

        for (let i = 0; i < pagesToSave.length; i++) {
          const pageNum = pagesToSave[i];
          updateLoadingText(`PDFを生成中... (${i + 1} / ${pagesToSave.length} ページ)`);
          
          const fCanvas = fabricCanvases[pageNum - 1];
          const hasRedaction = fCanvas.getObjects().length > 0;

          if (hasRedaction) {
            // 黒塗りがある場合: 漏洩防止のために完全に画像化する
            fCanvas.discardActiveObject();
            fCanvas.getObjects().forEach(obj => obj.set({ hasControls: false, hasBorders: false }));
            fCanvas.renderAll();
            
            const imgDataUrl = fCanvas.toDataURL({ format: 'jpeg', quality: 0.95 });
            const imgBytes = await fetch(imgDataUrl).then(res => res.arrayBuffer());
            const jpgImage = await newPdf.embedJpg(imgBytes);
            
            const srcPage = srcPdf.getPage(pageNum - 1);
            const { width, height } = srcPage.getSize();
            
            const page = newPdf.addPage([width, height]);
            page.drawImage(jpgImage, { x: 0, y: 0, width: width, height: height });
          } else {
            // 黒塗りがない場合: 画質劣化を防ぐため、元のページをそのままコピーする
            const [copiedPage] = await newPdf.copyPages(srcPdf, [pageNum - 1]);
            newPdf.addPage(copiedPage);
          }
        }

        updateLoadingText('ファイルをダウンロードしています...');
        
        const pdfBytes = await newPdf.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        
        const date = new Date();
        const dStr = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2, '0')}${date.getDate().toString().padStart(2, '0')}`;
        link.download = `編集済みPDF_${dStr}.pdf`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        
      } catch (err) {
        console.error(err);
        alert('保存中にエラーが発生しました。');
      } finally {
        hideLoading();
      }
    });
  </script>
</body>
</html>
